<header>
  <div class="header-content">
    <a href="/" aria-label="Kupify početna stranica">
      <img src="/images/kupify-logo.svg" alt="Kupify logo" class="logo" width="50" height="50"/>
    </a>

    <div class="header-text">
      <p class="site-title">KUPIFY shop</p>
      <p class="site-subtitle">Kolekcija dobrih proizvoda.</p>     
    </div>

    <nav class="header-nav">
      <a href="/" class="nav-button">Početna</a>
      <a href="/#kategorije" class="nav-button">Kategorije</a>
      <a href="/pages/o-nama/" class="nav-button">O nama</a>
      <a href="/pages/kontakt/" class="nav-button">Kontakt</a>
      <a href="/pages/blog/" class="nav-button">Korisni saveti</a>
    </nav>
  </div>
  <form action="/pages/search/" method="get" class="site-search" role="search">
    <label for="q" class="sr-only">Pretraga</label>
    <input id="q" name="q" type="search" placeholder="Pretražite proizvode..." />
    <button type="submit" class="site-search-btn" aria-label="Pokreni pretragu">
      <img src="/icons/search.svg" alt="Lupa za pretragu" width="20" height="20">
    </button>
  </form>
  
</header>
